<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { dark:'#12151C', secondary:'#1E293B', primary:'#2563EB', green:'#10B981', red:'#EF4444' } } } }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-dark text-gray-100 min-h-screen">

<header class="bg-secondary/95 backdrop-blur border-b border-gray-700 sticky top-0 z-40">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-primary flex items-center gap-2"><i class="fa fa-cogs"></i> Configurações</h1>
        <a href="gamehub_completo.html" class="px-3 py-1.5 bg-gray-600 rounded-lg text-sm"><i class="fa fa-arrow-left mr-1"></i> Voltar</a>
    </div>
</header>

<main class="container mx-auto px-4 py-6 max-w-3xl fade-in">
    <div class="bg-secondary p-6 rounded-xl border border-gray-700 mb-6">
        <h3 class="text-lg font-semibold mb-4">Dados da Plataforma</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-300 mb-1">Nome da Plataforma</label>
                <input type="text" id="nomePlataforma" value="GameHub" class="w-full p-3 rounded-lg bg-dark border border-gray-600">
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Formatos de Arquivo Permitidos</label>
                <input type="text" id="formatosPermitidos" value=".zip, .rar, .exe, .apk, .7z" class="w-full p-3 rounded-lg bg-dark border border-gray-600">
            </div>
            <div>
                <label class="block text-sm text-gray-300 mb-1">Tamanho Máximo de Upload (MB)</label>
                <input type="number" id="tamanhoMax" value="200" class="w-full p-3 rounded-lg bg-dark border border-gray-600">
            </div>
            <button onclick="salvarConfiguracoes()" class="w-full p-3 bg-green-600 hover:bg-green-700 rounded-lg font-medium">Salvar Alterações</button>
        </div>
    </div>

    <div class="bg-secondary p-6 rounded-xl border border-red-700/40">
        <h3 class="text-lg font-semibold text-red-400 mb-4">Área de Risco</h3>
        <div class="space-y-3">
            <button onclick="fazerBackup()" class="w-full p-3 bg-blue-600 hover:bg-blue-700 rounded-lg">📥 Fazer Backup de Todos os Dados</button>
            <button onclick="restaurarBackup()" class="w-full p-3 bg-yellow-600 hover:bg-yellow-700 rounded-lg">📤 Restaurar Backup</button>
            <button onclick="limparDados()" class="w-full p-3 bg-red-600 hover:bg-red-700 rounded-lg">🗑️ Limpar Todos os Dados</button>
        </div>
    </div>
</main>

<script>
function salvarConfiguracoes() {
    const cfg = {
        nome: document.getElementById('nomePlataforma').value,
        formatos: document.getElementById('formatosPermitidos').value,
        tamanhoMax: document.getElementById('tamanhoMax').value
    };
    localStorage.setItem('gh_config', JSON.stringify(cfg));
    alert('Configurações salvas com sucesso!');
}

function fazerBackup() {
    const dados = {
        jogos: JSON.parse(localStorage.getItem('gh_jogos')) || [],
        contas: JSON.parse(localStorage.getItem('gh_contas')) || [],
        denuncias: JSON.parse(localStorage.getItem('gh_denuncias')) || [],
        config: JSON.parse(localStorage.getItem('gh_config')) || {}
    };
    const blob = new Blob([JSON.stringify(dados, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_gamehub_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
}

function limparDados() {
    if(!confirm('TEM CERTEZA? TODOS OS DADOS SERÃO APAGADOS E NÃO PODEM SER RECUPERADOS!')) return;
    localStorage.clear();
    alert('Dados apagados!');
    window.location.reload();
}

window.onload = () => {
    const cfg = JSON.parse(localStorage.getItem('gh_config')) || {};
    if(cfg.nome) document.getElementById('nomePlataforma').value = cfg.nome;
    if(cfg.formatos) document.getElementById('formatosPermitidos').value = cfg.formatos;
    if(cfg.tamanhoMax) document.getElementById('tamanhoMax').value = cfg.tamanhoMax;
};
</script>
</body>
</html>
